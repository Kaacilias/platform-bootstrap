global:
  edition: ce

  hosts:
    domain: kube.home.ptiteigne.eu
    https: true

  ingress:
    enabled: false

  certificates:
    enabled: false

  certmanager:
    enabled: false

  minio:
    enabled: false

  appConfig:
    gitlab:
      host: gitlab.kube.home.ptiteigne.eu
      protocol: https
      port: 443
      trusted_proxies:
        - 0.0.0.0/0

    object_store:
      enabled: true
      connection:
        secret: gitlab-object-storage
        key: connection

  storageClass: rook-ceph-block

installCertmanager: false

certmanager-issuer:
  email: "test@example.com"

certmanagerIssuer:
  install: false

nginx-ingress:
  enabled: false

postgresql:
  install: true
  persistence:
    enabled: true
    storageClass: rook-ceph-block
    size: 20Gi

redis:
  install: true
  master:
    persistence:
      enabled: true
      storageClass: rook-ceph-block
      size: 10Gi

gitlab:
  webservice:
    service:
      type: ClusterIP
    ingress:
      enabled: false

  gitaly:
    persistence:
      enabled: true
      storageClass: rook-ceph-block
      size: 200Gi

  toolbox:
    backups:
      objectStorage:
        enabled: true
        config:
          secret: gitlab-object-storage
          key: connection

registry:
  enabled: true
  persistence:
    enabled: true
    storageClass: rook-ceph-block
    size: 50Gi

prometheus:
  install: false

gitlab-runner:
  install: true

  gitlabUrl: "http://gitlab-webservice-default.gitlab.svc.cluster.local:8080"

  runners:
    privileged: true   # required for docker-in-docker
    secret: gitlab-runner-secret
    executor: kubernetes

    securityContext:
      runAsUser: 0
      runAsGroup: 0
      allowPrivilegeEscalation: true

    config: |
      [[runners]]
        name = "k8s-runner"
        url = "http://gitlab-webservice-default.gitlab.svc.cluster.local:8080"
        token = ""
        executor = "kubernetes"
        [runners.kubernetes]
          namespace = "gitlab"
          image = "alpine:3.19"
          privileged = true

